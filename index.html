  if(view){const item=SC.find(d=>d.day===view.day);if(view.type==="detail")return <DetailView item={item} onBack={()=>setView(null)}/>;if(view.type==="sched")return <SchedView item={item} onBack={()=>setView(null)}/>;}
  return(<div style={S.wrap}><div style={{marginBottom:28}}><div style={{...S.lbl,marginBottom:6}}>10 DAYS · 9 NIGHTS</div><h2 style={S.h2}>每日行程</h2></div><div style={{position:"relative",paddingLeft:10}}><div style={{position:"absolute",left:19,top:20,bottom:40,width:1,background:"linear-gradient(to bottom, #CCFF00 0%, rgba(255,255,255,0.05) 55%, transparent 100%)"}}/><div style={{display:"flex",flexDirection:"column",gap:10}}>{SC.map(item=>(<div key={item.day} style={{display:"flex",gap:14,alignItems:"flex-start"}}><div style={{position:"relative",zIndex:1,flexShrink:0,width:38,height:38,borderRadius:"50%",background:item.hasDetail?"#CCFF00":"rgba(255,255,255,0.05)",border:item.hasDetail?"none":"1px solid rgba(255,255,255,0.1)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:16,marginLeft:2,marginTop:2}}>{item.hasDetail?<span>{item.e}</span>:<span style={{fontSize:11,fontWeight:900,color:"rgba(255,255,255,0.25)"}}>{item.day}</span>}</div><div style={{flex:1,background:"rgba(255,255,255,0.03)",border:`1px solid ${item.hasDetail?"rgba(204,255,0,0.14)":"rgba(255,255,255,0.06)"}`,borderRadius:18,overflow:"hidden"}}><div style={{padding:"14px 16px"}}><div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:5}}><div style={{display:"flex",alignItems:"center",gap:7}}><span style={{fontSize:10,fontWeight:900,color:item.hasDetail?"#CCFF00":"rgba(255,255,255,0.28)",letterSpacing:"0.1em"}}>DAY {item.day}</span><span style={{fontSize:10,color:"rgba(255,255,255,0.18)"}}>·</span><span style={{fontSize:10,color:"rgba(255,255,255,0.28)"}}>{item.date} {item.wd}</span>{item.charter&&<span style={{fontSize:9,color:"rgba(255,255,255,0.25)",background:"rgba(255,255,255,0.05)",padding:"2px 7px",borderRadius:99,fontWeight:700}}>包車</span>}</div><span style={{fontSize:10,color:"rgba(255,255,255,0.2)",display:"flex",alignItems:"center",gap:3}}><Ic d={I.pin} s={9} c="rgba(255,255,255,0.2)"/>{item.loc}</span></div><div style={{fontSize:15,fontWeight:800,color:"#fff",marginBottom:item.hotel?5:0}}>{item.title}</div>{item.hotel&&<div style={{fontSize:11,color:"rgba(255,255,255,0.3)",display:"flex",alignItems:"center",gap:4}}><Ic d={I.hotel} s={10} c="rgba(255,255,255,0.3)"/>{item.hotel}</div>}</div><div style={{display:"flex",borderTop:"1px solid rgba(255,255,255,0.05)"}}><button onClick={()=>setView({type:"sched",day:item.day})} style={{flex:1,background:"none",border:"none",borderRight:"1px solid rgba(255,255,255,0.05)",padding:"10px 0",cursor:"pointer",fontSize:11,fontWeight:700,color:"rgba(255,255,255,0.4)",display:"flex",alignItems:"center",justifyContent:"center",gap:5}}><Ic d={I.clock} s={12} c="rgba(255,255,255,0.35)"/> 時間表</button>{item.hasDetail?(<button onClick={()=>setView({type:"detail",day:item.day})} style={{flex:1,background:"none",border:"none",padding:"10px 0",cursor:"pointer",fontSize:11,fontWeight:700,color:"#CCFF00",display:"flex",alignItems:"center",justifyContent:"center",gap:5}}><Ic d={I.alert} s={12} c="#CCFF00"/> 景點攻略</button>):<div style={{flex:1,padding:"10px 0",fontSize:11,color:"rgba(255,255,255,0.12)",display:"flex",alignItems:"center",justifyContent:"center"}}>—</div>}</div></div></div>))}</div></div></div>);
};

/* ── Costs ── */
const CostsTab=()=>{
  const totalPP=COSTS.reduce((a,c)=>a+(c.pp||0),0);
  const paidCount=COSTS.filter(c=>c.status==="PAID"||c.status.includes("刷卡")).length;
  return(<div style={S.wrap}><div style={{marginBottom:28}}><div style={{...S.lbl,marginBottom:6}}>TRIP EXPENSES</div><h2 style={S.h2}>花費總覽</h2></div><div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:20}}><div style={{...S.card,padding:"18px 16px"}}><div style={{...S.lbl,marginBottom:6}}>每人預估</div><div style={{fontSize:26,fontWeight:900,color:"#CCFF00",letterSpacing:"-0.02em"}}>{totalPP.toLocaleString()}</div><div style={{fontSize:10,color:"rgba(255,255,255,0.25)",marginTop:3}}>新台幣（不含包車尾款）</div></div><div style={{...S.card,padding:"18px 16px"}}><div style={{...S.lbl,marginBottom:6}}>付款進度</div><div style={{fontSize:26,fontWeight:900,color:"#fff",letterSpacing:"-0.02em"}}>{paidCount}<span style={{fontSize:14,color:"rgba(255,255,255,0.3)",fontWeight:400}}> / {COSTS.length}</span></div><div style={{fontSize:10,color:"rgba(255,255,255,0.25)",marginTop:3}}>項目已完成</div></div></div><div style={{background:"rgba(245,158,11,0.07)",border:"1px solid rgba(245,158,11,0.2)",borderRadius:16,padding:"14px 16px",marginBottom:20,display:"flex",gap:10,alignItems:"flex-start"}}><Ic d={I.alert} s={16} c="#F59E0B"/><div><div style={{fontSize:13,fontWeight:800,color:"#F59E0B",marginBottom:3}}>包車尾款提醒</div><div style={{fontSize:12,color:"rgba(255,255,255,0.5)",lineHeight:1.6}}>強哥包車四天尾款 <span style={{color:"#F59E0B",fontWeight:700}}>3,000 RMB</span> 到付，記得備好現金人民幣！</div></div></div><div style={{...S.lbl,marginBottom:12}}>明細清單</div>{COSTS.map((c,i)=>{const isPaid=c.status==="PAID"||c.status.includes("刷卡");return(<div key={i} style={{...S.card,padding:"16px 18px",marginBottom:10}}><div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:8}}><div style={{flex:1}}><div style={{fontSize:14,fontWeight:800,color:"#fff",marginBottom:6}}>{c.item}</div><div style={{display:"flex",gap:6,flexWrap:"wrap",alignItems:"center",marginBottom:c.balance?6:0}}><span style={{fontSize:11,color:isPaid?"#CCFF00":"rgba(245,158,11,0.9)",background:isPaid?"rgba(204,255,0,0.1)":"rgba(245,158,11,0.1)",padding:"2px 8px",borderRadius:99,fontWeight:700}}>{isPaid?"✓ "+c.status:c.status}</span><span style={{fontSize:11,color:"rgba(255,255,255,0.25)"}}>付：{c.payer}</span></div>{c.balance&&<div style={{fontSize:11,color:"rgba(239,68,68,0.8)",fontWeight:700}}>⚠ 尾款：{c.balance}</div>}</div><div style={{textAlign:"right",flexShrink:0}}><div style={{fontSize:18,fontWeight:900,color:"#CCFF00"}}>{c.pp?.toLocaleString()}</div><div style={{fontSize:10,color:"rgba(255,255,255,0.25)",marginTop:2}}>per person</div></div></div></div>);})}</div>);
};

/* ── Todo ── */
const TodoTab=()=>{
  const [todos,setTodos]=useState(TODOS);
  const [loaded,setLoaded]=useState(false);
  useEffect(()=>{
    try{
      const saved=localStorage.getItem("yunnan_todos");
      if(saved){const doneIds=JSON.parse(saved);setTodos(TODOS.map(t=>({...t,done:doneIds.includes(t.id)})));}
    }catch(e){}
    setLoaded(true);
  },[]);
  useEffect(()=>{
    if(!loaded)return;
    try{localStorage.setItem("yunnan_todos",JSON.stringify(todos.filter(x=>x.done).map(x=>x.id)));}catch(e){}
  },[todos,loaded]);
  const toggle=id=>setTodos(t=>t.map(x=>x.id===id?{...x,done:!x.done}:x));
  const cats=[...new Set(todos.map(t=>t.cat))];
  const done=todos.filter(t=>t.done).length;
  const pct=Math.round((done/todos.length)*100);
  return(<div style={S.wrap}><div style={{marginBottom:28}}><div style={{...S.lbl,marginBottom:6}}>PREPARATION CHECKLIST</div><h2 style={S.h2}>待辦事項</h2></div><div style={{...S.card,padding:"20px 22px",marginBottom:24}}><div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-end",marginBottom:12}}><span style={{fontSize:13,color:"rgba(255,255,255,0.4)",fontWeight:600}}>整體準備進度</span><span style={{fontSize:28,fontWeight:900,color:pct===100?"#CCFF00":"#fff",letterSpacing:"-0.02em"}}>{pct}%</span></div><div style={{height:5,background:"rgba(255,255,255,0.06)",borderRadius:99,overflow:"hidden"}}><div style={{height:"100%",width:`${pct}%`,background:pct===100?"#CCFF00":"linear-gradient(90deg,#CCFF00,#88FF00)",borderRadius:99,transition:"width 0.5s cubic-bezier(0.34,1.56,0.64,1)"}}/></div><div style={{fontSize:11,color:"rgba(255,255,255,0.2)",marginTop:8}}>{done} / {todos.length} 項已完成</div></div>{cats.map(cat=>{const items=todos.filter(t=>t.cat===cat);const catDone=items.filter(t=>t.done).length;return(<div key={cat} style={{marginBottom:20}}><div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}><div style={{...S.lbl}}>{cat.toUpperCase()}</div><div style={{fontSize:11,color:"rgba(255,255,255,0.2)"}}>{catDone}/{items.length}</div></div><div style={{display:"flex",flexDirection:"column",gap:8}}>{items.map(item=>(<button key={item.id} onClick={()=>toggle(item.id)} style={{display:"flex",alignItems:"center",gap:14,background:item.done?"rgba(204,255,0,0.04)":"rgba(255,255,255,0.03)",border:`1px solid ${item.done?"rgba(204,255,0,0.18)":"rgba(255,255,255,0.07)"}`,borderRadius:16,padding:"14px 16px",cursor:"pointer",textAlign:"left",transition:"all 0.2s"}}><div style={{width:22,height:22,borderRadius:"50%",flexShrink:0,background:item.done?"#CCFF00":"transparent",border:`2px solid ${item.done?"#CCFF00":"rgba(255,255,255,0.15)"}`,display:"flex",alignItems:"center",justifyContent:"center",transition:"all 0.2s"}}>{item.done&&<Ic d={I.check} s={11} c="#000" sw={3}/>}</div><div style={{flex:1}}><div style={{fontSize:14,fontWeight:700,color:item.done?"rgba(255,255,255,0.28)":"#fff",textDecoration:item.done?"line-through":"none",marginBottom:2,transition:"all 0.2s"}}>{item.text}</div><div style={{fontSize:11,color:"rgba(255,255,255,0.22)",lineHeight:1.5}}>{item.sub}</div></div></button>))}</div></div>);})}</div>);
};

/* ── App ── */
const TABS=[{id:"weather",label:"天氣",icon:I.cloud},{id:"flights",label:"航班",icon:I.ticket},{id:"itinerary",label:"行程",icon:I.map},{id:"costs",label:"花費",icon:I.money},{id:"todo",label:"待辦",icon:I.list}];
function App(){
  const [tab,setTab]=useState("itinerary");
  return(<div style={{minHeight:"100vh",background:"#080A0E"}}><div style={{position:"fixed",inset:0,pointerEvents:"none",zIndex:0}}><div style={{position:"absolute",top:-80,left:"50%",transform:"translateX(-50%)",width:500,height:320,background:"radial-gradient(ellipse,rgba(204,255,0,0.045) 0%,transparent 70%)"}}/><div style={{position:"absolute",bottom:80,right:-80,width:350,height:250,background:"radial-gradient(ellipse,rgba(99,102,241,0.04) 0%,transparent 70%)"}}/></div><div style={{position:"relative",zIndex:1,padding:"calc(env(safe-area-inset-top) + 44px) 20px 28px"}}><div style={{...S.lbl,marginBottom:10}}>APRIL 2026</div><div style={{display:"flex",alignItems:"flex-end",justifyContent:"space-between"}}><div><h1 style={{fontSize:42,fontWeight:900,color:"#fff",letterSpacing:"-0.03em",lineHeight:0.95,marginBottom:10}}>雲南<br/><span style={{color:"#CCFF00"}}>之旅</span></h1><div style={{display:"flex",alignItems:"center",gap:6}}><div style={{width:6,height:6,borderRadius:"50%",background:"#CCFF00",boxShadow:"0 0 7px #CCFF00"}}/><span style={{fontSize:12,color:"rgba(255,255,255,0.32)",fontWeight:600}}>麗江 · 香格里拉 · 大理</span></div></div><div style={{textAlign:"right"}}><div style={{fontSize:40,fontWeight:900,color:"#fff",letterSpacing:"-0.02em",lineHeight:1}}>12</div><div style={{...S.lbl}}>DAYS</div></div></div></div><div className="tab-fade" key={tab} style={{position:"relative",zIndex:1}}>{tab==="weather"&&<WeatherTab/>}{tab==="flights"&&<FlightsTab/>}{tab==="itinerary"&&<ItineraryTab/>}{tab==="costs"&&<CostsTab/>}{tab==="todo"&&<TodoTab/>}</div><nav style={{position:"fixed",bottom:"calc(env(safe-area-inset-bottom) + 16px)",left:"50%",transform:"translateX(-50%)",zIndex:100,background:"rgba(18,20,26,0.92)",backdropFilter:"blur(24px)",border:"1px solid rgba(255,255,255,0.07)",borderRadius:999,padding:"7px 8px",display:"flex",gap:2,boxShadow:"0 8px 32px rgba(0,0,0,0.4)"}}>{TABS.map(t=>{const active=tab===t.id;return(<button key={t.id} onClick={()=>setTab(t.id)} style={{display:"flex",alignItems:"center",gap:active?6:0,background:active?"#CCFF00":"transparent",border:"none",borderRadius:999,padding:active?"9px 14px 9px 12px":"9px 12px",cursor:"pointer",transition:"all 0.3s cubic-bezier(0.34,1.4,0.64,1)",overflow:"hidden"}}><Ic d={t.icon} s={17} c={active?"#000":"rgba(255,255,255,0.38)"} sw={active?2:1.5}/><span style={{fontSize:11,fontWeight:900,color:"#000",maxWidth:active?40:0,opacity:active?1:0,transition:"all 0.3s cubic-bezier(0.34,1.4,0.64,1)",overflow:"hidden",whiteSpace:"nowrap"}}>{t.label}</span></button>);})}</nav></div>);
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
