const wInfo = code => {
  if(code===0)  return {label:"晴朗",emoji:"☀️",color:"#F59E0B"};
  if(code<=3)   return {label:"多雲",emoji:"⛅",color:"#94A3B8"};
  if(code<=48)  return {label:"霧霾",emoji:"🌫️",color:"#64748B"};
  if(code<=67)  return {label:"降雨",emoji:"🌧️",color:"#60A5FA"};
  if(code<=99)  return {label:"雷陣雨",emoji:"⛈️",color:"#A78BFA"};
  return {label:"未知",emoji:"🌡️",color:"#94A3B8"};
};

/* ── Shared styles ────────────────────────────────────────────────────────── */
const S = {
  card:{background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.08)",borderRadius:22,overflow:"hidden",position:"relative"},
  label:{fontSize:11,color:"rgba(255,255,255,0.28)",letterSpacing:"0.2em",fontWeight:700},

  wrap:{padding:"0 20px 110px"},
  sectionHead:{marginBottom:28},
};

/* ════════════════════════════════════════════════════════════════════════════
   WEATHER TAB
═════════════════════════════════════════════════════════════════════════════ */
const WeatherTab = () => {
  const [data, setData] = useState(null);
  const [status, setStatus] = useState("loading"); // loading | ok | error
  const [errMsg, setErrMsg] = useState("");

  const load = useCallback(() => {
    setStatus("loading");
    setData(null);
    setErrMsg("");

    const url = loc =>
      `https://api.open-meteo.com/v1/forecast?latitude=${loc.lat}&longitude=${loc.lon}` +
      `&current=temperature_2m,relative_humidity_2m,weather_code,wind_speed_10m,apparent_temperature` +
      `&daily=weather_code,temperature_2m_max,temperature_2m_min,precipitation_probability_max` +
      `&timezone=Asia%2FShanghai&forecast_days=6`;

    Promise.all(
      LOCS.map(loc =>
        fetch(url(loc))
          .then(r => { if(!r.ok) throw new Error(`HTTP ${r.status}`); return r.json(); })
          .then(d => ({...loc, d}))
      )
    )
    .then(results => { setData(results); setStatus("ok"); })
    .catch(e => { setErrMsg(e.message || "網路連線失敗"); setStatus("error"); });
  }, []);

  useEffect(() => { load(); }, []);

  /* Loading */
  if(status === "loading") return (
    <div style={{...S.wrap, display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",minHeight:"60vh",gap:14}}>
      <div className="spin" style={{width:36,height:36,border:"2px solid rgba(255,255,255,0.08)",borderTop:"2px solid #CCFF00",borderRadius:"50%"}}/>
      <p style={{...S.label,letterSpacing:"0.25em"}}>正在取得氣象資料...</p>
    </div>
  );

  /* Error */
  if(status === "error") return (
    <div style={{...S.wrap,paddingTop:20}}>
      <div style={{background:"rgba(239,68,68,0.07)",border:"1px solid rgba(239,68,68,0.2)",borderRadius:22,padding:28,textAlign:"center"}}>
        <div style={{fontSize:36,marginBottom:12}}>📡</div>
        <div style={{fontSize:16,fontWeight:800,color:"#fff",marginBottom:8}}>氣象資料載入失敗</div>
        <div style={{fontSize:13,color:"rgba(255,255,255,0.4)",marginBottom:6,lineHeight:1.6}}>
          請確認網路連線正常後重試
        </div>
        <div style={{fontSize:11,color:"rgba(239,68,68,0.6)",marginBottom:22,fontFamily:"monospace"}}>{errMsg}</div>
        <button onClick={load} style={{display:"inline-flex",alignItems:"center",gap:8,background:"#CCFF00",border:"none",borderRadius:99,padding:"12px 24px",fontSize:14,fontWeight:900,color:"#000",cursor:"pointer"}}>
          <Ic d={I.refresh} s={16} c="#000" sw={2}/> 重新載入
        </button>
      </div>

      {/* Offline fallback cards */}
      <div style={{marginTop:24}}>
        <div style={{...S.label,marginBottom:12}}>目的地資訊（離線模式）</div>
        {LOCS.map(loc => (
          <div key={loc.id} style={{...S.card,marginBottom:12,padding:"18px 20px"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <div>
                <div style={{...S.label,marginBottom:4}}>{loc.name.toUpperCase()}</div>
                <div style={{fontSize:13,color:"rgba(255,255,255,0.4)"}}>
                  {loc.name==="麗江"?"海拔 2400m · 溫差大，早晚需保暖":
                   loc.name==="香格里拉"?"海拔 3300m · 備妥高山症藥物":
                   "海拔 2000m · 氣候舒適，洱海周邊多風"}
                </div>
              </div>
              <div style={{fontSize:28}}>
                {loc.name==="麗江"?"🏔️":loc.name==="香格里拉"?"🛕":"🌊"}
              </div>
            </div>
          </div>
        ))}
      </div>
    </div>
  );

  /* Success */
  return (
    <div style={S.wrap}>
      <div style={S.sectionHead}>
        <div style={{...S.label,marginBottom:6}}>LIVE FORECAST · OPEN-METEO</div>
        <h2 style={S.h2}>目的地氣候</h2>
      </div>

      {data.map(loc => {
        const c = loc.d.current;
        const dl = loc.d.daily;
        const wi = wInfo(c.weather_code);
        return (
          <div key={loc.id} style={{...S.card,marginBottom:16,padding:"24px 22px"}}>
            {/* glow */}
            <div style={{position:"absolute",top:0,right:0,width:180,height:180,background:`radial-gradient(circle at 80% 10%, ${wi.color}18 0%, transparent 70%)`,pointerEvents:"none"}}/>

            {/* top row */}
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:20,position:"relative"}}>
              <div>
                <div style={{...S.label,marginBottom:6}}>{loc.name}</div>
                <div style={{fontSize:62,fontWeight:900,color:"#fff",lineHeight:1,letterSpacing:"-0.03em"}}>
                  {Math.round(c.temperature_2m)}°
                </div>
                <div style={{fontSize:12,color:"rgba(255,255,255,0.35)",marginTop:4}}>
                  體感 {Math.round(c.apparent_temperature)}° · 濕度 {c.relative_humidity_2m}%
                </div>
              </div>
              <div style={{textAlign:"right",paddingTop:4}}>
                <div style={{fontSize:36,marginBottom:8}}>{wi.emoji}</div>
                <div style={{display:"inline-block",background:wi.color+"28",border:`1px solid ${wi.color}50`,color:wi.color,fontSize:12,fontWeight:800,padding:"4px 12px",borderRadius:99}}>
                  {wi.label}
                </div>
              </div>
            </div>

            {/* stats */}
            <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8,marginBottom:20}}>
              {[
                {l:"最高",v:`${Math.round(dl.temperature_2m_max[0])}°`},
                {l:"最低",v:`${Math.round(dl.temperature_2m_min[0])}°`},
                {l:"降雨機率",v:`${dl.precipitation_probability_max[0]}%`},
              ].map((s,i)=>(

/* ════════════════════════════════════════════════════════════════════════════
   TODO TAB
═════════════════════════════════════════════════════════════════════════════ */
const TodoTab = () => {
  const [todos, setTodos] = useState(TODOS_INIT);
  const toggle = id => setTodos(t=>t.map(x=>x.id===id?{...x,done:!x.done}:x));
  const cats = [...new Set(todos.map(t=>t.cat))];
  const done = todos.filter(t=>t.done).length;
  const pct = Math.round((done/todos.length)*100);

  return (
    <div style={S.wrap}>
      <div style={S.sectionHead}>
        <div style={{...S.label,marginBottom:6}}>PREPARATION CHECKLIST</div>
        <h2 style={S.h2}>待辦事項</h2>
      </div>

      {/* progress */}
      <div style={{...S.card,padding:"20px 22px",marginBottom:24}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-end",marginBottom:12}}>
          <span style={{fontSize:13,color:"rgba(255,255,255,0.4)",fontWeight:600}}>整體準備進度</span>
          <span style={{fontSize:28,fontWeight:900,color:pct===100?"#CCFF00":"#fff",letterSpacing:"-0.02em"}}>{pct}%</span>
        </div>
        <div style={{height:5,background:"rgba(255,255,255,0.06)",borderRadius:99,overflow:"hidden"}}>
          <div style={{height:"100%",width:`${pct}%`,background:pct===100?"#CCFF00":"linear-gradient(90deg,#CCFF00,#88FF00)",borderRadius:99,transition:"width 0.5s cubic-bezier(0.34,1.56,0.64,1)"}}/>
        </div>
        <div style={{fontSize:11,color:"rgba(255,255,255,0.2)",marginTop:8}}>{done} / {todos.length} 項已完成</div>
      </div>

      {cats.map(cat=>{
        const items = todos.filter(t=>t.cat===cat);
        const catDone = items.filter(t=>t.done).length;
        return (
          <div key={cat} style={{marginBottom:20}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
              <div style={{...S.label}}>{cat.toUpperCase()}</div>
              <div style={{fontSize:11,color:"rgba(255,255,255,0.2)"}}>{catDone}/{items.length}</div>
            </div>
            <div style={{display:"flex",flexDirection:"column",gap:8}}>
              {items.map(item=>(
                <button key={item.id} onClick={()=>toggle(item.id)}
                  style={{display:"flex",alignItems:"center",gap:14,
                    background:item.done?"rgba(204,255,0,0.04)":"rgba(255,255,255,0.03)",
                    border:`1px solid ${item.done?"rgba(204,255,0,0.18)":"rgba(255,255,255,0.07)"}`,
                    borderRadius:16,padding:"14px 16px",cursor:"pointer",textAlign:"left",transition:"all 0.2s"}}>
                  <div style={{width:22,height:22,borderRadius:"50%",flexShrink:0,
                    background:item.done?"#CCFF00":"transparent",
                    border:`2px solid ${item.done?"#CCFF00":"rgba(255,255,255,0.15)"}`,
                    display:"flex",alignItems:"center",justifyContent:"center",transition:"all 0.2s"}}>
                    {item.done && <Ic d={I.check} s={11} c="#000" sw={3}/>}
                  </div>
                  <div style={{flex:1}}>
                    <div style={{fontSize:14,fontWeight:700,
                      color:item.done?"rgba(255,255,255,0.28)":"#fff",
                      textDecoration:item.done?"line-through":"none",
                      marginBottom:2,transition:"all 0.2s"}}>{item.text}</div>
                    <div style={{fontSize:11,color:"rgba(255,255,255,0.22)",lineHeight:1.5}}>{item.sub}</div>
                  </div>
                </button>
              ))}
            </div>
          </div>
        );
      })}
    </div>
  );
};

              }}>
              <Ic d={t.icon} s={18} c={active?"#000":"rgba(255,255,255,0.38)"} sw={active?2:1.5}/>
              <span style={{
                fontSize:12,fontWeight:900,color:"#000",
                maxWidth:active?44:0,opacity:active?1:0,
                transition:"all 0.3s cubic-bezier(0.34,1.4,0.64,1)",
                overflow:"hidden",whiteSpace:"nowrap",letterSpacing:"0.02em"
              }}>{t.label}</span>
            </button>
          );
        })}
      </nav>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
